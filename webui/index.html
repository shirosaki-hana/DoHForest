<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoH Forest</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>DoH Forest</h1>
      <nav>
        <button class="tab active" data-tab="dns">DNS Lookup</button>
        <button class="tab" data-tab="cache">Cache</button>
        <button class="tab" data-tab="logs">Log Monitor</button>
      </nav>
    </header>

    <main>
      <!-- DNS Lookup -->
      <section id="dns" class="panel active">
        <form id="dnsForm">
          <div class="form-row">
            <div class="form-group grow">
              <label for="dnsDomain">Domain</label>
              <input type="text" id="dnsDomain" placeholder="example.com" required autocomplete="off" spellcheck="false" />
            </div>
            <div class="form-group">
              <label for="dnsType">Type</label>
              <select id="dnsType"></select>
            </div>
          </div>
          <div class="form-row align-center">
            <label class="toggle">
              <input type="checkbox" id="dnsBypass" checked />
              <span>Bypass cache</span>
            </label>
            <button type="submit" class="btn primary" id="dnsSubmit">Lookup</button>
          </div>
        </form>

        <div id="dnsResult" class="hidden">
          <div id="dnsSummary" class="summary-bar"></div>
          <table id="dnsAnswers">
            <thead>
              <tr>
                <th>Name</th>
                <th>Type</th>
                <th>TTL</th>
                <th>Data</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- Cache -->
      <section id="cache" class="panel">
        <div id="cacheStats" class="stats-bar"></div>

        <div class="cache-config-bar" id="cacheConfig"></div>

        <div class="cache-actions">
          <button class="btn small danger" id="flushCache">Flush Cache</button>
          <button class="btn small" id="cacheRefresh">Refresh</button>
        </div>

        <div class="cache-toolbar">
          <input type="search" id="cacheSearch" placeholder="Search domain..." autocomplete="off" />
          <select id="cacheStatus">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="expired">Expired</option>
          </select>
        </div>

        <div class="cache-table-wrap">
          <table id="cacheTable">
            <thead>
              <tr>
                <th>Domain</th>
                <th class="col-type">Type</th>
                <th class="col-ttl">TTL</th>
                <th class="col-upstream">Upstream</th>
                <th class="col-expires">Expires</th>
                <th class="col-status">Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="pagination">
          <button class="btn small" id="cachePrev" disabled>&larr; Prev</button>
          <span id="cachePageInfo">-</span>
          <button class="btn small" id="cacheNext" disabled>Next &rarr;</button>
        </div>
      </section>

      <!-- Log Monitor -->
      <section id="logs" class="panel">
        <div id="logStats" class="stats-bar"></div>

        <div class="log-toolbar">
          <select id="logLevel">
            <option value="">All Levels</option>
          </select>
          <select id="logCategory">
            <option value="">All Categories</option>
          </select>
          <input type="search" id="logSearch" placeholder="Search..." autocomplete="off" />
          <label class="toggle">
            <input type="checkbox" id="logAutoRefresh" checked />
            <span>Auto</span>
          </label>
          <button class="btn small" id="logRefresh">Refresh</button>
        </div>

        <div class="log-table-wrap">
          <table id="logTable">
            <thead>
              <tr>
                <th class="col-time">Time</th>
                <th class="col-level">Level</th>
                <th class="col-cat">Category</th>
                <th>Message</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="pagination">
          <button class="btn small" id="logPrev" disabled>&larr; Prev</button>
          <span id="logPageInfo">-</span>
          <button class="btn small" id="logNext" disabled>Next &rarr;</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
